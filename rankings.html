<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rankings · UE Guild Dashboard</title>
  <link rel="stylesheet" href="./css/styles.css">
  <script src="./js/i18n.js"></script>
  <style>
    .leaderboard-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 1.5rem; }
    .leaderboard-row { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid var(--border); transition: background 0.15s; }
    .leaderboard-row:hover { background: var(--bg-hover); }
    .leaderboard-rank { font-size: 1.2rem; font-weight: 700; color: var(--text-muted); width: 30px; }
    .leaderboard-rank.top-1 { color: #ffd700; text-shadow: 0 0 5px rgba(255,215,0,0.5); font-size: 1.4rem; }
    .leaderboard-rank.top-2 { color: #c0c0c0; text-shadow: 0 0 5px rgba(192,192,192,0.5); font-size: 1.3rem; }
    .leaderboard-rank.top-3 { color: #cd7f32; text-shadow: 0 0 5px rgba(205,127,50,0.5); font-size: 1.2rem; }
    .leaderboard-name { font-weight: 600; color: var(--text-primary); margin-left: 10px; flex-grow: 1; text-decoration: none; overflow: hidden; text-overflow: ellipsis; }
    .leaderboard-name:hover { text-decoration: underline; color: var(--accent-blue); }
    .leaderboard-value { font-family: var(--font-mono); font-weight: 700; font-size: 1.1rem; white-space: nowrap; }
    @media (max-width: 768px) {
      .leaderboard-container { grid-template-columns: 1fr; }
      .leaderboard-row { padding: 10px 8px; }
      .leaderboard-name { font-size: 0.85rem; }
      .leaderboard-value { font-size: 0.9rem; }
    }
    @media (max-width: 480px) {
      .leaderboard-container { grid-template-columns: 1fr; gap: 1rem; }
      .leaderboard-rank { width: 24px; font-size: 1rem; }
      .leaderboard-name { font-size: 0.8rem; margin-left: 6px; }
      .leaderboard-value { font-size: 0.82rem; }
    }
  </style>
</head>
<body>

  <!-- ── Navigation ── -->
  <nav class="navbar">
    <div class="container">
      <div class="navbar-brand">
        <span class="logo">🏰</span>
        <span>UE Guild <span>Dashboard</span></span>
      </div>
      
      <div style="display: flex; align-items: center; gap: 10px;">
        <div class="lang-switcher-container">
          <select class="lang-select" id="lang-switcher">
            <option value="en">English</option>
            <option value="es">Español</option>
            <option value="fr">Français</option>
            <option value="pt">Português</option>
            <option value="vi">Tiếng Việt</option>
            <option value="ja">日本語</option>
            <option value="zh">简体中文</option>
          </select>
        </div>
        <button class="menu-toggle" aria-label="Toggle menu">☰</button>
      </div>

      <ul class="navbar-nav">
        <li><a href="./index.html" data-i18n="nav_home">🏠 Home</a></li>
        <li><a href="./war.html" data-i18n="nav_war">🏰 War</a></li>
        <li><a href="./hunt.html" data-i18n="nav_hunt">🦅 Hunt</a></li>
        <li><a href="./festival.html" data-i18n="nav_festival">🎪 Festival</a></li>
        <li><a href="./rankings.html" class="active" data-i18n="nav_rankings">🏆 Rankings</a></li>
        <li><a href="./members.html" data-i18n="nav_members">👥 Check Member</a></li>
        <li><a href="./tracker.html" data-i18n="nav_tracker">🕵️‍♂️ Tracker</a></li>
      </ul>
    </div>
  </nav>

  <!-- ── Page Content ── -->
  <main class="container">
    <div class="page-header">
      <h1 data-i18n="nav_rankings">🏆 Guild Rankings</h1>
      <p data-i18n="rankings_desc">Top members by power, kills, and recent name changes.</p>
    </div>

    <div id="rankings-container">
      <div class="loading-state">
        <div class="spinner"></div>
        <p data-i18n="loading_rankings">Loading ranking data…</p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container" data-i18n="footer_text">
      UE Guild Dashboard · Data updated via Telegram Bot
    </div>
  </footer>

  <script src="./js/app.js"></script>
  <script src="./js/rankings.js"></script>
</body>
</html>
