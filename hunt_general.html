<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hunt General — UE Guild</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.32.0/plotly.min.js"></script>
<style>
  :root {
    --bg:     #080c10;
    --card:   #0e1117;
    --card2:  #141920;
    --border: #1e2533;
    --text:   #dce4f0;
    --muted:  #5a6a82;
    --blue:   #4f9cf9;
    --green:  #34d058;
    --red:    #f55555;
    --gold:   #e3a336;
    --purple: #a371f7;
    --cyan:   #39c5cf;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
  }
  h1,h2,h3,h4,h5 { font-family: 'Rajdhani', sans-serif; font-weight: 700; letter-spacing: .02em; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .stat-card { text-align:center; padding:1.1rem .8rem; }
  .stat-num  { font-family:'Rajdhani',sans-serif; font-size:2rem; font-weight:700; line-height:1; }
  .stat-lbl  { font-size:.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-top:.3rem; }
  .nav-bar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: .6rem 1.2rem;
    display: flex;
    align-items: center;
    gap: .5rem;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }
  .nav-logo { font-family:'Rajdhani',sans-serif; font-size:1.2rem; font-weight:700; color:var(--gold); white-space:nowrap; }
  .nav-pill {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: .3rem .75rem;
    text-decoration: none;
    color: var(--muted);
    font-size: .78rem;
    transition: all .18s;
  }
  .nav-pill:hover { border-color:var(--blue); color:var(--blue); background:rgba(79,156,249,.07); }
  .nav-pill.active { background:var(--blue); color:#fff; border-color:var(--blue); }
  .ts { font-size:.7rem; color:var(--muted); margin-left:auto; white-space:nowrap; }
  .sec-hdr { border-bottom:1px solid var(--border); padding-bottom:.5rem; margin-bottom:1.2rem; }
  .badge-ok  { background:rgba(52,208,88,.15);  color:var(--green);  border:1px solid rgba(52,208,88,.4);  border-radius:4px; padding:1px 8px; font-size:.72rem; }
  .badge-no  { background:rgba(245,85,85,.15);  color:var(--red);    border:1px solid rgba(245,85,85,.4);  border-radius:4px; padding:1px 8px; font-size:.72rem; }
  .table { color:var(--text); margin-bottom:0; }
  .table th  { color:var(--muted); font-size:.7rem; text-transform:uppercase; letter-spacing:.06em; border-color:var(--border); font-weight:500; }
  .table td  { border-color:var(--border); font-size:.83rem; vertical-align:middle; }
  .table tbody tr:hover { background:rgba(79,156,249,.05); }
  .progress-bar-outer { background:#1a2233; border-radius:4px; height:7px; flex:1; overflow:hidden; }
  .empty-state { text-align:center; padding:3rem 1rem; color:var(--muted); }
  .empty-state .icon { font-size:3rem; margin-bottom:.8rem; }
</style>
</head>
<body>
<nav class="nav-bar">
  <span class="nav-logo">⚔️ UE Guild</span>
  <a href="index.html" class="nav-pill">🏠 Home</a>
  <a href="hunt_general.html" class="nav-pill active">🎯 Hunt General</a>
  <a href="hunt_individual.html" class="nav-pill">👤 Hunt Individual</a>
  <a href="war_general.html" class="nav-pill">🏰 War General</a>
  <a href="war_months.html" class="nav-pill">📅 War Monthly</a>
  <a href="war_individual.html" class="nav-pill">📈 War Individual</a>
  <span class="ts" id="ts-top">🕒 Loading...</span>
</nav>

<div class="container-fluid px-3 px-md-4 py-4 pb-5" id="main-container" style="display:none;">
<div class="d-flex align-items-end gap-3 mb-4 flex-wrap">
  <div><h1 style="font-size:2rem;margin-bottom:0;">🎯 Hunt Report — General</h1>
  <p style="color:var(--muted);margin:0;">Week: <strong id="lbl-week">...</strong> &middot; <span id="lbl-days">...</span> day(s) recorded</p></div>
</div>

<div class="row g-3 mb-4">
  <div class="col-6 col-lg-3"><div class="card stat-card"><div class="stat-num" style="color:var(--blue)" id="st-tot">0</div><div class="stat-lbl">Total Members</div></div></div>
  <div class="col-6 col-lg-3"><div class="card stat-card"><div class="stat-num" style="color:var(--green)" id="st-met">0</div><div class="stat-lbl" id="st-met-lbl">Met Quota</div></div></div>
  <div class="col-6 col-lg-3"><div class="card stat-card"><div class="stat-num" style="color:var(--red)" id="st-no">0</div><div class="stat-lbl">Not Met</div></div></div>
  <div class="col-6 col-lg-3"><div class="card stat-card"><div class="stat-num" style="color:var(--gold)" id="st-pts">0</div><div class="stat-lbl">Guild Total Pts</div></div></div>
</div>

<div class="row g-3 mb-3">
  <div class="col-md-8"><div class="card p-3"><div id="c-top" style="height:340px;"></div></div></div>
  <div class="col-md-4"><div class="card p-3"><div id="c-pie" style="height:340px;"></div></div></div>
</div>
<div class="row g-3 mb-4">
  <div class="col-md-6"><div class="card p-3"><div id="c-lvl" style="height:300px;"></div></div></div>
  <div class="col-md-6"><div class="card p-3"><div id="c-day" style="height:300px;"></div></div></div>
</div>

<div class="card p-3">
  <h3 class="sec-hdr">📋 Full Table</h3>
  <div class="table-responsive">
    <table class="table table-hover" id="tbl-players">
      <thead><tr><th>#</th><th>Name</th><th>Hunt Pts</th><th>Purch Pts</th><th>Total</th><th style="min-width:120px">Progress</th><th>Status</th><th>Hunt Levels</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
const THEME = {
  paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)',
  font: { color: '#dce4f0', family: 'Inter, sans-serif', size: 11 },
  xaxis: { gridcolor: '#1e2533', color: '#5a6a82', linecolor: '#1e2533', zerolinecolor: '#1e2533' },
  yaxis: { gridcolor: '#1e2533', color: '#5a6a82', linecolor: '#1e2533', zerolinecolor: '#1e2533' },
  margin: { t: 42, l: 55, r: 18, b: 65 },
};
const cfg = { responsive: true, displayModeBar: false };
function lay(title, xl='', yl='', extra={}) {
  return { ...THEME, title: { text: title, font: { color: '#dce4f0', size: 14, family: 'Rajdhani, sans-serif' } },
           xaxis: { ...THEME.xaxis, title: xl }, yaxis: { ...THEME.yaxis, title: yl }, ...extra };
}

fetch('data/hunt_general_data.json')
  .then(r => r.json())
  .then(d => {
    document.getElementById('main-container').style.display = 'block';
    document.getElementById('ts-top').textContent = '🕒 ' + d.generated_at;
    
    document.getElementById('lbl-week').textContent = d.week_start + ' → ' + d.week_end;
    document.getElementById('lbl-days').textContent = d.days_recorded;
    
    document.getElementById('st-tot').textContent = d.stats.total_members;
    document.getElementById('st-met').textContent = d.stats.met_quota;
    document.getElementById('st-met-lbl').textContent = 'Met Quota (' + d.hunt_goal + 'pts)';
    document.getElementById('st-no').textContent = d.stats.not_met;
    document.getElementById('st-pts').textContent = d.stats.total_pts.toLocaleString();
    
    // Plots
    Plotly.newPlot('c-top',[{type:'bar',x:d.top_25.names,y:d.top_25.pts,marker:{color:d.top_25.colors},text:d.top_25.pts,textposition:'outside'}],
      {...lay('Top Members — Weekly Points','','Points'),showlegend:false},cfg);
      
    Plotly.newPlot('c-pie',[{type:'pie',labels:['✅ Met Quota','❌ Not Met'],values:d.pie.vals,
      marker:{colors:d.pie.colors},hole:.45,textinfo:'label+value',insidetextfont:{color:'#dce4f0'}}],
      {...THEME,title:{text:'Participation',font:{color:'#dce4f0',size:14,family:'Rajdhani'}},margin:{t:42,l:10,r:10,b:10}},cfg);
      
    Plotly.newPlot('c-lvl',[
      {type:'bar',name:'Hunt',x:['L1','L2','L3','L4','L5'],y:d.level_totals.hunt,marker:{color:'#4f9cf9'}},
      {type:'bar',name:'Purch',x:['L1','L2','L3','L4','L5'],y:d.level_totals.purch,marker:{color:'#a371f7'}},
    ],{...lay('Monsters/Chests By Level','Level','Quantity'),barmode:'group'},cfg);
    
    if(d.daily_progression.dates.length > 0){
      Plotly.newPlot('c-day',[{type:'scatter',mode:'lines+markers',x:d.daily_progression.dates,y:d.daily_progression.cum,
        line:{color:'#4f9cf9',width:2.5},fill:'tozeroy',fillcolor:'rgba(79,156,249,.1)',
        text:d.daily_progression.cum,textposition:'top center'}],
        lay('Daily Progression — Cumulative Points','Date','Points'),cfg);
    } else {
      document.getElementById('c-day').innerHTML='<div class="empty-state"><div class="icon">📭</div>No progression data this week</div>';
    }
    
    // Table
    const tbody = document.querySelector('#tbl-players tbody');
    let html = '';
    d.players.forEach((p, i) => {
      const cls = p.met ? 'badge-ok' : 'badge-no';
      const icon = p.met ? '✅' : '❌';
      const pColor = p.met ? '#34d058' : '#f55555';
      const w = Math.min(p.pct, 100);
      
      html += `<tr>
        <td class="text-center" style="color:var(--muted)">${i+1}</td>
        <td><strong>${p.name}</strong></td>
        <td class="text-center">${p.hunt_pts}</td>
        <td class="text-center">${p.purch_pts}</td>
        <td class="text-center"><strong>${p.total_pts}</strong></td>
        <td>
          <div style="display:flex;align-items:center;gap:6px;">
            <div class="progress-bar-outer"><div style="width:${w}%;height:100%;background:${pColor};border-radius:4px;"></div></div>
            <span style="font-size:.72rem;color:var(--muted);width:34px;">${p.pct.toFixed(1)}%</span>
          </div>
        </td>
        <td class="text-center"><span class="${cls}">${icon}</span></td>
        <td><span style='color:var(--muted);font-size:.72rem'>L1:<b style='color:var(--text)'>${p.l1}</b></span> <span style='color:var(--muted);font-size:.72rem'>L2:<b style='color:var(--text)'>${p.l2}</b></span> <span style='color:var(--muted);font-size:.72rem'>L3:<b style='color:var(--text)'>${p.l3}</b></span> <span style='color:var(--muted);font-size:.72rem'>L4:<b style='color:var(--text)'>${p.l4}</b></span> <span style='color:var(--muted);font-size:.72rem'>L5:<b style='color:var(--text)'>${p.l5}</b></span></td>
      </tr>`;
    });
    tbody.innerHTML = html;
  })
  .catch(e => {
    console.error(e);
    document.getElementById('ts-top').textContent = '⚠️ Error loading data';
  });
</script>
</body>
</html>
